<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hong's AI Table Studio</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <style>
      :root {
        /* 核心配色：黑灰色与品牌蓝 #6290E6 */
        --ink-color: #2d3436;      /* 深黑灰色 */
        --accent-color: #6290E6;   /* 品牌蓝色锚点 */
        --paper-color: #fdfaf6;    /* 暖调纸张背景 */
      }
      
      body { margin: 0; padding: 0; background-color: var(--paper-color); }
      
      #initial-splash {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: var(--paper-color);
        overflow: hidden;
        -webkit-app-region: drag;
        transition: opacity 0.5s ease;
      }

      .splash-main-wrapper {
        display: flex;
        flex-direction: row; /* 左右布局 */
        align-items: center;
        justify-content: center;
        gap: 25px; 
      }

      /* 纸张纹理感 */
      .splash-paper-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* 手绘滤镜 */
      .splash-hand-drawn-svg {
        filter: url(#splash-rough-pencil);
        flex-shrink: 0;
        animation: splash-float 4s ease-in-out infinite alternate;
      }

      @keyframes splash-float {
        0% { transform: translateY(0px) rotate(0deg); }
        100% { transform: translateY(-8px) rotate(1deg); }
      }

      /* 笔触动画 */
      .splash-stroke {
        fill: none;
        stroke: var(--ink-color);
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: splash-drawLine 1.2s ease-in-out forwards;
      }

      @keyframes splash-drawLine {
        to { stroke-dashoffset: 0; }
      }

      /* 四芒星动画：极速弹出 */
      .splash-ai-star {
        fill: var(--accent-color);
        opacity: 0;
        transform-origin: center;
        animation: splash-starPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes splash-starPop {
        from { transform: scale(0) rotate(-15deg); opacity: 0; }
        to { transform: scale(1) rotate(0deg); opacity: 1; }
      }

      /* 品牌文字区：修正视觉中心向左偏移 */
      .splash-branding {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        opacity: 0;
        /* 整体向左偏移对冲倾斜感 */
        transform: translateX(10px);
        animation: splash-fadeInAndBalance 0.8s ease-out 2.8s forwards;
      }

      @keyframes splash-fadeInAndBalance {
        to { 
          opacity: 1; 
          transform: translateX(-22px); 
        }
      }

      .splash-main-title {
        font-family: "Segoe Script", "Comic Sans MS", cursive;
        font-size: 42px;
        font-weight: bold;
        color: var(--ink-color);
        margin: 0;
        white-space: nowrap;
        line-height: 1.1;
      }

      .splash-apostrophe {
        color: var(--accent-color);
      }

      .splash-studio-tag {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 7px;
        color: var(--accent-color);
        text-transform: uppercase;
        margin-top: 6px;
        margin-left: 15px; 
      }

      /* 底部加载状态及版权信息 */
      .splash-footer-status {
        position: absolute;
        bottom: 40px;
        font-family: -apple-system, sans-serif;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.2em;
        color: #b2bec3;
        text-transform: uppercase;
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .splash-loading-status {
        animation: splash-pulse 2s infinite ease-in-out;
      }

      .splash-copyright {
        opacity: 0.6;
        font-weight: 400;
        letter-spacing: 0.1em;
      }

      @keyframes splash-pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="initial-splash">
      <div class="splash-paper-overlay"></div>

      <div class="splash-main-wrapper">
        <!-- 左侧：图形动画区 -->
        <svg class="splash-hand-drawn-svg" width="220" height="220" viewBox="0 0 120 120">
          <defs>
            <filter id="splash-rough-pencil" x="-20%" y="-20%" width="140%" height="140%">
              <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
              <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
            </filter>
          </defs>

          <!-- 1. 表格主框 (0s - 1.5s) -->
          <path class="splash-stroke" style="animation-duration: 1.5s;" d="M20,25 Q60,20 100,28 Q105,65 102,100 Q60,105 22,102 Q15,65 20,25" />
          
          <!-- 2. 分割十字：带有间隙 (1.5s - 2.5s) -->
          <path class="splash-stroke" style="animation-delay: 1.5s; animation-duration: 0.5s; stroke-width: 3;" d="M48,32 Q50,65 47,94" />
          <path class="splash-stroke" style="animation-delay: 1.8s; animation-duration: 0.5s; stroke-width: 3;" d="M26,48 Q60,45 94,52" />
          
          <!-- 3. 右下方两条装饰线：加速收尾，不等长处理 (2.2s - 2.5s) -->
          <!-- 第一条：较长 -->
          <path class="splash-stroke" style="animation-delay: 2.2s; animation-duration: 0.2s; stroke-width: 2.5;" d="M60,74 Q80,72 92,75" />
          <!-- 第二条：较短 -->
          <path class="splash-stroke" style="animation-delay: 2.4s; animation-duration: 0.2s; stroke-width: 2.5;" d="M62,88 Q75,86 82,89" />

          <!-- 4. 四芒星：极速弹出 (2.6s) -->
          <path class="splash-ai-star" style="animation-delay: 2.6s;" d="M34,30 C35,35 35,35 40,36 C35,37 35,37 34,42 C33,37 33,37 28,36 C33,35 33,35 34,30 Z" />
        </svg>

        <!-- 右侧：品牌文字区 -->
        <div class="splash-branding">
          <div class="splash-main-title">Hong<span class="splash-apostrophe">'</span>s AI</div>
          <div class="splash-studio-tag">Table Studio</div>
        </div>
      </div>

      <div class="splash-footer-status">
        <div class="splash-loading-status">Engine Initializing</div>
        <div class="splash-copyright">©LiHong 2026</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // When React app completely loads, this can be triggered
      window.removeInitialSplash = function() {
        const splash = document.getElementById('initial-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      };
    </script>
  </body>
</html>
